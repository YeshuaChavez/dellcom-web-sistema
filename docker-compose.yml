version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: dellcom_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://root:rootpassword@db:3306/dellcom_db"
      NEXTAUTH_SECRET: "super-secret-auth-key-change-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      - db

volumes:
  mysql_data:
